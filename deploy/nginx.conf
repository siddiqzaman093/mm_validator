##
## Nginx config for MM Validator
## Place at: /etc/nginx/sites-available/mmvalidator
## Then: sudo ln -s /etc/nginx/sites-available/mmvalidator /etc/nginx/sites-enabled/
##       sudo nginx -t && sudo systemctl reload nginx
##

server {
    listen 80;
    server_name _;   # Replace with your domain, e.g.: mmvalidator.example.com

    # Serve React frontend (built static files)
    root /var/www/mmvalidator;
    index index.html;

    # React SPA — all non-asset paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy for FastAPI backend
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow large file uploads (50 MB)
        client_max_body_size 50M;
        proxy_read_timeout   120s;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}

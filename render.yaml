# Render Blueprint — FastAPI backend for the SAP MM Validator.
# Create it in Render via:  New → Blueprint → connect this repo.
# Secret values (marked sync:false) are entered in the Render dashboard, never
# committed to git.
services:
  - type: web
    name: mm-validator-api
    runtime: python
    plan: free
    # Build/start run from the repo root so the `validator/` package and
    # `sample_data/SAP_UOM_All.xlsx` (loaded at import time) are available.
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "uvicorn main:app --app-dir backend --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: JWT_SECRET          # random signing key, generated by Render
        generateValue: true
      - key: MM_PASSWORD         # admin password — set in dashboard
        sync: false
      - key: MM01_PASSWORD       # mm01 password — set in dashboard
        sync: false
      # Named users (login id = e-mail address; env var = mailbox name):
      - key: SIDDIQ_UZZAMAN_PASSWORD     # siddiq.uzzaman@arete-global.com (Admin)
        sync: false
      - key: ISMAIL_SHAIK_PASSWORD       # ismail.shaik@arete-global.com
        sync: false
      - key: MOHAMED_OMRAN_PASSWORD      # mohamed.omran@arete-global.com
        sync: false
      - key: MOHAMED_OSAMA_PASSWORD      # mohamed.osama@arete-global.com
        sync: false
      - key: YAHYA_OMAR_PASSWORD         # yahya.omar@arete-global.com
        sync: false
      - key: MOHAMED_ELEWA_PASSWORD      # mohamed.elewa@arete-global.com
        sync: false
      - key: ABDELAZIZ_NASSAR_PASSWORD   # abdelaziz.nassar@arete-global.com
        sync: false
      - key: ABDELRHAMAN_OSAMA_PASSWORD  # abdelrhaman.osama@arete-global.com
        sync: false
      - key: DATABASE_URL        # OPTIONAL — Postgres URL (Neon/Supabase/Render) for a
        sync: false              # durable usage log; without it, SQLite resets on deploy
      - key: AI_PRICING_JSON     # OPTIONAL — per-model token prices, e.g.
        sync: false              # {"gpt-5.4": [1.25, 10.0]} (USD per 1M in/out tokens)
      - key: OPENAI_API_KEY      # your ROTATED OpenAI key — set in dashboard
        sync: false
      - key: ALLOWED_ORIGINS     # your Vercel URL, e.g. https://mm-validator.vercel.app
        sync: false

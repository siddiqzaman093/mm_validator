# Render Blueprint — FastAPI backend for the SAP MM Validator.
# Create it in Render via:  New → Blueprint → connect this repo.
#
# ⚠️ SECRETS ARE INTENTIONALLY NOT DECLARED HERE.
# A blueprint sync manages (and can wipe) every env var listed in this file —
# that once blanked all passwords and locked every account out. Secrets are
# therefore managed ONLY in the Render dashboard (service → Environment),
# where blueprint syncs never touch them. Add these there manually:
#
#   MM_PASSWORD                  built-in admin password
#   MM01_PASSWORD                mm01 password
#   SIDDIQ_UZZAMAN_PASSWORD      siddiq.uzzaman@arete-global.com (Admin)
#   ISMAIL_SHAIK_PASSWORD        ismail.shaik@arete-global.com
#   MOHAMED_OMRAN_PASSWORD       mohamed.omran@arete-global.com
#   MOHAMED_OSAMA_PASSWORD       mohamed.osama@arete-global.com
#   YAHYA_OMAR_PASSWORD          yahya.omar@arete-global.com
#   MOHAMED_ELEWA_PASSWORD       mohamed.elewa@arete-global.com
#   ABDELAZIZ_NASSAR_PASSWORD    abdelaziz.nassar@arete-global.com
#   ABDELRHAMAN_OSAMA_PASSWORD   abdelrhaman.osama@arete-global.com
#   OPENAI_API_KEY               server-side AI key
#   ALLOWED_ORIGINS              e.g. https://mm-validator.vercel.app
#   DATABASE_URL                 Neon/Supabase Postgres URL for the usage log
#   AI_PRICING_JSON              optional per-model price overrides
#
# (Blank/missing password vars fall back to the dev default password123;
# blank ALLOWED_ORIGINS falls back to allow-all — the app degrades safely
# instead of locking out.)
services:
  - type: web
    name: mm-validator-api
    runtime: python
    plan: free
    # Build/start run from the repo root so the `validator/` package and
    # `sample_data/SAP_UOM_All.xlsx` (loaded at import time) are available.
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "uvicorn main:app --app-dir backend --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: JWT_SECRET          # random signing key, generated once by Render
        generateValue: true
